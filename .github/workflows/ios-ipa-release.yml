name: ios-ipa-release

on:
  # 模块职责：代码进入 main 后自动构建并发布 IPA，或支持手动触发紧急发布。
  push:
    branches: ["main"]
  workflow_dispatch:

# 模块职责：同一分支只保留最新一次运行，新的提交会自动取消未完成的旧运行。
concurrency:
  group: ios-ipa-release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-release:
    # 关键逻辑：在 macOS runner 上完成“无签名构建 -> 产物生成 -> Release 上传”全流程。
    runs-on: macos-latest
    outputs:
      release_tag: ${{ steps.release_tag.outputs.tag }}
    env:
      TZ: Asia/Shanghai
      APP_NAME: CarRecord
      SCHEME: CarRecord
      PROJECT_PATH: CarRecord/CarRecord.xcodeproj
      # 局域网基地址示例：http://nas.local/car-record
      LAN_BASE_URL: ${{ secrets.LAN_BASE_URL }}
      ICON_URL: ${{ secrets.ICON_URL }}
      ALTSTORE_SOURCE_NAME: CarRecord Source
      BUNDLE_IDENTIFIER: com.tx.app.CarRecord
      DEVELOPER_NAME: tx

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate release tag
        id: release_tag
        run: |
          # 关键逻辑：发布标签使用上海时区，和你本地时间一致，避免时差误解。
          echo "tag=build-$(date +'%Y%m%d-%H%M')" >> "$GITHUB_OUTPUT"

      - name: Build IPA and metadata
        env:
          RELEASE_TAG: ${{ steps.release_tag.outputs.tag }}
          CI_BUILD_NUMBER: ${{ github.run_number }}
          PUBLIC_RELEASE_BASE_URL: https://github.com/${{ github.repository }}/releases/download/${{ steps.release_tag.outputs.tag }}
        run: |
          chmod +x scripts/build_release_artifacts.sh
          scripts/build_release_artifacts.sh

      - name: Upload release assets
        # 关键逻辑：发布外网可访问资产，供 AltStore 源直接引用下载链接。
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          name: CarRecord ${{ steps.release_tag.outputs.tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            release/CarRecord.ipa
            release/source.json
            release/install.html
            release/sha256.txt
            release/build-meta.json
            release/source.lan.json
            release/install.lan.html

      - name: Upload build artifacts for debug
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ steps.release_tag.outputs.tag }}
          path: release/
          retention-days: 7

  publish-static-install-page:
    # 模块职责：把“最新一次构建”的安装入口发布为固定 URL，iPhone 只需点同一个链接。
    needs: build-release
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
    steps:
      - name: Download release artifact
        uses: actions/download-artifact@v4
        with:
          name: release-${{ needs.build-release.outputs.release_tag }}
          path: artifact

      - name: Prepare static page
        run: |
          # 关键逻辑：固定托管 install/source，内部仍指向本次 Release 资产，实现“链接不变、内容自动更新”。
          mkdir -p pages
          cp artifact/install.html pages/install.html
          cp artifact/source.json pages/source.json
          cp artifact/build-meta.json pages/build-meta.json
          cp artifact/sha256.txt pages/sha256.txt
          # 关键逻辑：将安装页中的 source 链接改为固定 gh-pages 地址，避免 AltStore 源地址随 tag 变化。
          STABLE_SOURCE_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/source.json"
          STABLE_INSTALL_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/install.html"
          perl -0777 -i -pe "s#https://github\\.com/[^\\\"]+/releases/download/[^/]+/source\\.json#${STABLE_SOURCE_URL//\//\\/}#g; s#https://github\\.com/[^\\\"]+/releases/download/[^/]+/install\\.html#${STABLE_INSTALL_URL//\//\\/}#g; s#altstore://source\\?url=https://github\\.com/[^\\\"]+/releases/download/[^/]+/source\\.json#altstore://source?url=${STABLE_SOURCE_URL//\//\\/}#g" pages/install.html
          cp pages/install.html pages/index.html

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./pages
          force_orphan: true

      - name: Post-release self-check
        run: |
          # 关键逻辑：发布后校验固定 source.json 是否已指向“本次 tag 的 IPA”，避免旧链接继续被客户端使用。
          STABLE_SOURCE_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/source.json"
          EXPECTED_URL="https://github.com/${{ github.repository }}/releases/download/${{ needs.build-release.outputs.release_tag }}/CarRecord.ipa?v=${{ needs.build-release.outputs.release_tag }}"
          ACTUAL_URL=""

          for i in {1..12}; do
            echo "自检第 ${i} 次：${STABLE_SOURCE_URL}"
            ACTUAL_URL="$(curl -fsSL "${STABLE_SOURCE_URL}" | python3 -c 'import json,sys; d=json.load(sys.stdin); print(d["apps"][0]["versions"][0]["downloadURL"])' || true)"
            echo "当前 downloadURL: ${ACTUAL_URL}"
            if [[ "${ACTUAL_URL}" == "${EXPECTED_URL}" ]]; then
              echo "自检通过：固定 source 已更新为本次发布产物。"
              exit 0
            fi
            sleep 10
          done

          echo "自检失败：downloadURL 未更新到本次发布。期望=${EXPECTED_URL}，实际=${ACTUAL_URL}" >&2
          exit 1

      - name: Write summary
        run: |
          echo "固定安装页: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/install.html" >> "$GITHUB_STEP_SUMMARY"
          echo "固定 AltStore 源: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/source.json" >> "$GITHUB_STEP_SUMMARY"
